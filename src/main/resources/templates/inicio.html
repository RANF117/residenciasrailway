<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Inicio del sistema</title>
<link rel="stylesheet" th:href="@{/css/styles.css}">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
	<header class="header">
		<div class="header-content">
			<img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
			<div>
				<h1>Sistema de Residencias Profesionales</h1>
				<p>Panel de inicio</p>
			</div>
		</div>
	</header>

	<div class="layout">
		<aside th:replace="~{fragmento/fragment :: aside}"></aside>

		<main class="main">
			<div class="card">
				<h2>Bienvenido al sistema</h2>

				<p>
					<strong>Bienvenido:</strong> <span th:text="${nombreCompleto}"></span>
				</p>
				<p>
					<strong>Usuario:</strong> <span th:text="${username}"></span>
				</p>
				<p>
					<strong>Rol actual:</strong> <span th:text="${rolActual}"></span>
				</p>
				<div class="actions" style="margin-top: 20px;">
					<a class="btn" sec:authorize="hasRole('RESIDENTE')"
						th:href="@{/documentoResidencia/mostrarDocumentos}"> <i
						class="bi bi-folder2-open"></i> Mi expediente
					</a> <a class="btn"
						sec:authorize="hasAnyRole('ASESOR_INTERNO','ASESOR_EXTERNO')"
						th:href="@{/seguimientoResidencia/mostrarSeguimientos}"> <i
						class="bi bi-list-check"></i> Seguimientos
					</a> <a class="btn"
						sec:authorize="hasAnyRole('ASESOR_INTERNO','ASESOR_EXTERNO','JEFE_DIVISION')"
						th:href="@{/evaluacionReporteFinal/mostrar}"> <i
						class="bi bi-journal-check"></i> Evaluación reporte final
					</a> <a class="btn" sec:authorize="hasRole('JEFE_DIVISION')"
						th:href="@{/proyectoResidencia/mostrarProyectosResidencia}"> <i
						class="bi bi-briefcase"></i> Administrar proyectos
					</a>
				</div>
			</div>
		</main>
	</div>
</body>
</html>
