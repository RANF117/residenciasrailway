<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle evaluación reporte final</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="header">
  <div class="header-content">
    <img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
    <div>
      <h1>Sistema de Residencias Profesionales</h1>
      <p>Detalle de evaluación del reporte final</p>
    </div>
  </div>
</header>

<div class="layout">
  <aside th:replace="~{fragmento/fragment :: aside}"></aside>

  <main class="main">
    <div class="card">
      <h2>Detalle de evaluación del reporte final</h2>

      <p><strong>Proyecto:</strong> <span th:text="${evaluacionReporteFinalObj.proyectoResidencia != null ? evaluacionReporteFinalObj.proyectoResidencia.nombreProyecto : ''}"></span></p>
      <p><strong>Fecha de evaluación:</strong> <span th:text="${evaluacionReporteFinalObj.fechaEvaluacion != null ? #dates.format(evaluacionReporteFinalObj.fechaEvaluacion, 'dd-MM-yyyy') : ''}"></span></p>
      <p><strong>Total asesor interno:</strong> <span th:text="${evaluacionReporteFinalObj.calificacionAsesorInterno}"></span></p>
      <p><strong>Total asesor externo:</strong> <span th:text="${evaluacionReporteFinalObj.calificacionAsesorExterno}"></span></p>
      <p><strong>Promedio reporte final:</strong> <span th:text="${evaluacionReporteFinalObj.calificacionFinalReporte}"></span></p>
      <p><strong>Observaciones internas:</strong> <span th:text="${evaluacionReporteFinalObj.observacionesInterno}"></span></p>
      <p><strong>Observaciones externas:</strong> <span th:text="${evaluacionReporteFinalObj.observacionesExterno}"></span></p>

      <div class="actions">
        <a class="btn secondary" th:href="@{/evaluacionReporteFinal/mostrar}">Regresar</a>
      </div>
    </div>
  </main>
</div>
</body>
</html>
