<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estatus evaluación reporte final</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="header">
  <div class="header-content">
    <img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
    <div>
      <h1>Sistema de Residencias Profesionales</h1>
      <p>Administración de estatus de evaluación del reporte final</p>
    </div>
  </div>
</header>

<div class="layout">
  <aside th:replace="~{fragmento/fragment :: aside}"></aside>

  <main class="main">
    <div class="card">
      <h2>Evaluaciones activas e inactivas</h2>

      <form th:action="@{/evaluacionReporteFinal/estatus}" method="get" class="grid" style="margin-bottom:20px;">
        <div class="field">
          <label>Buscar por proyecto</label>
          <input type="text" name="nombreProyecto" th:value="${nombreProyecto}">
        </div>
        <div class="actions" style="grid-column:1 / -1;">
          <button type="submit">Buscar</button>
          <a class="btn secondary" th:href="@{/evaluacionReporteFinal/estatus}">Limpiar</a>
        </div>
      </form>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Proyecto</th>
            <th>Promedio</th>
            <th>Estatus</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="e : ${evaluacionReporteFinal}">
            <td th:text="${e.idEvaluacionReporteFinal}"></td>
            <td th:text="${e.proyectoResidencia != null ? e.proyectoResidencia.nombreProyecto : ''}"></td>
            <td th:text="${e.calificacionFinalReporte}"></td>
            <td>
              <span th:if="${e.estatus == 1}">Activo</span>
              <span th:if="${e.estatus == 0}">Inactivo</span>
            </td>
            <td>
              <a class="btn danger" th:if="${e.estatus == 1}" th:href="@{/evaluacionReporteFinal/eliminar/{id}(id=${e.idEvaluacionReporteFinal})}">
                Desactivar
              </a>
              <a class="btn" th:if="${e.estatus == 0}" th:href="@{/evaluacionReporteFinal/activar/{id}(id=${e.idEvaluacionReporteFinal})}">
                Activar
              </a>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="actions">
        <a class="btn secondary" th:href="@{/evaluacionReporteFinal/mostrar}">Regresar</a>
      </div>
    </div>
  </main>
</div>
</body>
</html>
