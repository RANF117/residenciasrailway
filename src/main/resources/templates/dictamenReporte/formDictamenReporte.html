<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictaminar reporte preliminar</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <header class="header">
    <h1>Sistema de Residencias Profesionales</h1>
    <p>Dictamen del reporte preliminar</p>
  </header>

  <div class="layout">
   <aside th:replace="~{fragmento/fragment :: aside}"> </aside>
    <main class="main">
      <div class="card">
        <h2>Datos del reporte</h2>

        <form th:action="@{/dictamenReporte/guardar}" th:object="${dictamen}" method="post">
          <input type="hidden" th:field="*{idDictamen}">
          <input type="hidden" th:field="*{estatus}">
          <input type="hidden" th:field="*{reportePreliminar.idReportePreliminar}">

          <div class="grid">
            <div class="field">
              <label>Proyecto</label>
              <input type="text" th:value="${dictamen.reportePreliminar.proyectoResidencia.nombreProyecto}" readonly>
            </div>

            <div class="field">
              <label>Estudiante</label>
              <input type="text" th:value="${dictamen.reportePreliminar.proyectoResidencia.nombreEstudiante}" readonly>
            </div>

            <div class="field">
              <label>No. Control</label>
              <input type="text" th:value="${dictamen.reportePreliminar.proyectoResidencia.numeroControl}" readonly>
            </div>

            <div class="field">
              <label>Resultado</label>
              <select th:field="*{resultado}" required>
                <option value="">Seleccione un resultado</option>
                <option value="Aprobado">Aprobado</option>
                <option value="Condicionado">Condicionado</option>
                <option value="Rechazado">Rechazado</option>
              </select>
            </div>

            <div class="field">
              <label>Fecha de dictamen</label>
              <input type="date" th:field="*{fechaDictamen}" required>
            </div>

            <div class="field" style="grid-column:1 / -1;">
              <label>Observaciones</label>
              <textarea th:field="*{observaciones}" required></textarea>
            </div>
          </div>

          <div class="actions">
            <button type="submit">
              <i class="bi bi-save"></i> Guardar dictamen
            </button>

            <a class="btn secondary" th:href="@{/reportePreliminar/mostrar}">
              Regresar
            </a>
          </div>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
