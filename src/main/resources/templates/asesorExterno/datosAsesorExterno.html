<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<title>Asesores externos</title>
<link rel="stylesheet" th:href="@{/css/styles.css}">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<header class="header">
  <div class="header-content">
    <img th:src="@{/img/logoTec.jpeg}" class="logo-header">
    <div>
      <h1>Sistema de Residencias Profesionales</h1>
      <p>Catálogo de asesores externos</p>
    </div>
  </div>
</header>

<div class="layout">
  <aside th:replace="~{fragmento/fragment :: aside}"></aside>

  <main class="main">
    <div class="card">

      <div th:if="${msg}" class="alert-success">
        <span th:text="${msg}"></span>
      </div>

      <div class="actions">
        <a class="btn" th:href="@{/asesorExterno/formulario}">
          <i class="bi bi-plus-circle"></i> Nuevo asesor
        </a>

        <a class="btn light" th:href="@{/asesorExterno/estatusAsesoresExternos}">
          <i class="bi bi-arrow-repeat"></i> Administrar estatus
        </a>
      </div>

      <h2>Asesores externos activos</h2>

      <form th:action="@{/asesorExterno/mostrarAsesoresExternos}" method="get" class="grid" style="margin-bottom: 20px;">
        <div class="field">
          <label>Buscar por nombre</label>
          <input type="text" name="nombre" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ ]+$" 
            title="Por favor, ingrese solo letras"  th:value="${nombre}">
        </div>

        <div class="actions" style="grid-column:1 / -1;">
          <button type="submit">Buscar</button>
          <a class="btn secondary" th:href="@{/asesorExterno/mostrarAsesoresExternos}">Limpiar</a>
        </div>
      </form>

     <table>
  <thead>
    <tr>
      <th>Foto</th>
      <th>Nombre</th>
      <th>Correo</th>
      <th>Empresa</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody>
    <tr th:each="a : ${asesorExterno}">
     <td>
  <img th:if="${a.foto == 'noFoto.jpeg' || a.foto == null}"
       th:src="@{/img/noFoto.jpeg}"
       width="60"
       style="border-radius: 8px;">

  <img th:if="${a.foto != 'noFoto.jpeg' && a.foto != null}"
       th:src="@{/residencias/asesoresExternos/{img}(img=${a.foto})}"
       width="60"
       style="border-radius: 8px;">
</td>

      <td th:text="${a.nombre + ' ' + a.apellidoPaterno + ' ' + a.apellidoMaterno}"></td>
      <td th:text="${a.correo}"></td>
      <td th:text="${a.empresa != null ? a.empresa.nombre : 'Sin empresa'}"></td>

      <td>
        <a class="btn secondary" th:href="@{/asesorExterno/ver/{id}(id=${a.idAsesorExterno})}">
          <i class="bi bi-eye"></i>
        </a>

        <a class="btn light" th:href="@{/asesorExterno/editar/{id}(id=${a.idAsesorExterno})}">
          <i class="bi bi-pencil-square"></i>
        </a>

        <a class="btn danger"
           th:href="@{/asesorExterno/eliminar/{id}(id=${a.idAsesorExterno})}"
           onclick="return confirm('¿Desea desactivar este asesor?')">
          <i class="bi bi-trash"></i>
        </a>
      </td>
    </tr>
  </tbody>
</table>

    </div>
  </main>
</div>

</body>
</html>
