<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<title>Propuestas de proyecto</title>
<link rel="stylesheet" th:href="@{/css/styles.css}">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
	<header class="header">
		<div class="header-content">
			<img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
			<div>
				<h1>Sistema de Residencias Profesionales</h1>
				<p>Propuestas de proyecto</p>
			</div>
		</div>
	</header>

	<div class="layout">
		<aside th:replace="~{fragmento/fragment :: aside}"></aside>

		<main class="main">
			<div class="card">
				<div th:if="${msg}" class="alert-success">
					<span th:text="${msg}"></span>
				</div>

				<div class="actions">
					<a class="btn" th:href="@{/propuestaProyecto/formulario}"> <i
						class="bi bi-plus-circle"></i> Nueva propuesta
					</a> <a class="btn light"
						th:href="@{/propuestaProyecto/estatusPropuestas}"> <i
						class="bi bi-arrow-repeat"></i> Administrar estatus
					</a>
				</div>

				<h2>Propuestas activas</h2>

				<form th:action="@{/propuestaProyecto/mostrarPropuestas}"
					method="get" class="grid" style="margin-bottom: 20px;">
					<div class="field">
						<label>Buscar por nombre</label> <input type="text"
							name="nombreProyecto" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ ]+$"
							title="Por favor, ingrese solo letras"
							th:value="${nombreProyecto}">
					</div>

					<div class="field">
						<label>Buscar por periodo</label> <select name="periodo">
							<option value="">Todos</option>
							<option value="ENERO-JUNIO"
								th:selected="${periodo == 'ENERO-JUNIO'}">ENERO-JUNIO</option>
							<option value="AGOSTO-DICIEMBRE"
								th:selected="${periodo == 'AGOSTO-DICIEMBRE'}">AGOSTO-DICIEMBRE</option>
						</select>
					</div>

					<div class="actions" style="grid-column: 1/-1;">
						<button type="submit">Buscar</button>
						<a class="btn secondary"
							th:href="@{/propuestaProyecto/mostrarPropuestas}">Limpiar</a>
					</div>
				</form>

				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Proyecto</th>
							<th>Residente</th>
							<th>Periodo</th>
							<th>Estado revisión</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="p : ${propuestaProyecto}">
							<td th:text="${p.idPropuestaProyecto}"></td>
							<td th:text="${p.nombreProyecto}"></td>
							<td
								th:text="${p.residente != null ? p.residente.nombre + ' ' + p.residente.apellidoPaterno : ''}"></td>
							<td th:text="${p.periodo}"></td>
							<td th:text="${p.estadoRevision}"></td>
							<td><a class="btn secondary"
								th:href="@{/propuestaProyecto/ver/{id}(id=${p.idPropuestaProyecto})}">
									<i class="bi bi-eye"></i>
							</a> <a class="btn light"
								th:href="@{/propuestaProyecto/editar/{id}(id=${p.idPropuestaProyecto})}">
									<i class="bi bi-pencil-square"></i>
							</a> <a class="btn danger"
								th:href="@{/propuestaProyecto/eliminar/{id}(id=${p.idPropuestaProyecto})}"
								onclick="return confirm('¿Desea desactivar esta propuesta?')">
									<i class="bi bi-trash"></i>
							</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
	</div>
</body>
</html>
