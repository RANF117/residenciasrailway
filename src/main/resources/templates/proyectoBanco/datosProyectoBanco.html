<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos del banco</title>
<link rel="stylesheet" th:href="@{/css/styles.css}">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
	<header class="header">
		<div class="header-content">
			<img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
			<div>
				<h1>Sistema de Residencias Profesionales</h1>
				<p>Banco de proyectos</p>
			</div>
		</div>
	</header>

	<div class="layout">
		<aside th:replace="~{fragmento/fragment :: aside}"></aside>

		<main class="main">
			<div class="card">
				<div th:if="${msg}" class="alert-success">
					<span th:text="${msg}"></span>
				</div>

				<div class="actions">
					<a class="btn" th:href="@{/proyectoBanco/formulario}"> <i
						class="bi bi-plus-circle"></i> Nuevo proyecto
					</a> <a class="btn light"
						th:href="@{/proyectoBanco/estatusProyectosBanco}"> <i
						class="bi bi-arrow-repeat"></i> Administrar estatus
					</a>
				</div>

				<h2>Proyectos activos del banco</h2>

				<form th:action="@{/proyectoBanco/mostrarProyectosBanco}"
					method="get" class="grid" style="margin-bottom: 20px;">
					<div class="field">
						<label>Buscar por nombre</label> <input type="text"
							name="nombreProyecto" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ ]+$"
							title="Por favor, ingrese solo letras"
							th:value="${nombreProyecto}">
					</div>

					<div class="field">
					<label>Buscar por periodo</label>
						<select name="periodo">
							<option value="">Todos</option>
							<option value="ENERO-JUNIO"
								th:selected="${periodo == 'ENERO-JUNIO'}">ENERO-JUNIO</option>
							<option value="AGOSTO-DICIEMBRE"
								th:selected="${periodo == 'AGOSTO-DICIEMBRE'}">AGOSTO-DICIEMBRE</option>
						</select>
					</div>

					<div class="actions" style="grid-column: 1/-1;">
						<button type="submit">Buscar</button>
						<a class="btn secondary"
							th:href="@{/proyectoBanco/mostrarProyectosBanco}">Limpiar</a>
					</div>
				</form>

				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Proyecto</th>
							<th>Carrera</th>
							<th>Periodo</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="p : ${proyectoBanco}">
							<td th:text="${p.idProyectoBanco}"></td>
							<td th:text="${p.nombreProyecto}"></td>
							<td th:text="${p.carrera != null ? p.carrera.nombre : ''}"></td>
							<td th:text="${p.periodo}"></td>

							<td><a class="btn secondary"
								th:href="@{/proyectoBanco/ver/{id}(id=${p.idProyectoBanco})}">
									<i class="bi bi-eye"></i>
							</a> <a class="btn light"
								th:href="@{/proyectoBanco/editar/{id}(id=${p.idProyectoBanco})}">
									<i class="bi bi-pencil-square"></i>
							</a> <a class="btn danger"
								th:href="@{/proyectoBanco/eliminar/{id}(id=${p.idProyectoBanco})}"
								onclick="return confirm('¿Desea desactivar este proyecto?')">
									<i class="bi bi-trash"></i>
							</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
	</div>
</body>
</html>
