<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estatus banco de proyectos</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
      <div>
        <h1>Sistema de Residencias Profesionales</h1>
        <p>Administración de estatus del banco de proyectos</p>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside th:replace="~{fragmento/fragment :: aside}"></aside>

    <main class="main">
      <div class="card">
        <h2>Proyectos activos e inactivos</h2>

        <form th:action="@{/proyectoBanco/estatusProyectosBanco}" method="get" class="grid" style="margin-bottom: 20px;">
          <div class="field">
            <label>Buscar por nombre</label>
            <input type="text" name="nombreProyecto" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ ]+$" 
            title="Por favor, ingrese solo letras" th:value="${nombreProyecto}">
          </div>

          <div class="field">
            <label>Buscar por periodo</label>
            <select name="periodo">
              <option value="">Todos</option>
              <option value="ENERO-JUNIO" th:selected="${periodo == 'ENERO-JUNIO'}">ENERO-JUNIO</option>
              <option value="AGOSTO-DICIEMBRE" th:selected="${periodo == 'AGOSTO-DICIEMBRE'}">AGOSTO-DICIEMBRE</option>
            </select>
          </div>

          <div class="actions" style="grid-column:1 / -1;">
            <button type="submit">Buscar</button>
            <a class="btn secondary" th:href="@{/proyectoBanco/estatusProyectosBanco}">Limpiar</a>
          </div>
        </form>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Proyecto</th>
              <th>Periodo</th>
              <th>Estatus</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="p : ${proyectoBanco}">
              <td th:text="${p.idProyectoBanco}"></td>
              <td th:text="${p.nombreProyecto}"></td>
              <td th:text="${p.periodo}"></td>
              <td>
                <span th:if="${p.estatus == 1}">Activo</span>
                <span th:if="${p.estatus == 0}">Inactivo</span>
              </td>
              <td>
                <a class="btn danger" th:if="${p.estatus == 1}" th:href="@{/proyectoBanco/eliminar/{id}(id=${p.idProyectoBanco})}">
                  Desactivar
                </a>
                <a class="btn" th:if="${p.estatus == 0}" th:href="@{/proyectoBanco/activar/{id}(id=${p.idProyectoBanco})}">
                  Activar
                </a>
              </td>
            </tr>
          </tbody>
        </table>

        <div class="actions">
          <a class="btn secondary" th:href="@{/proyectoBanco/mostrarProyectosBanco}">Regresar</a>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
