<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Revisión de reportes preliminares</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="header">
  <div class="header-content">
    <img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
    <div>
      <h1>Sistema de Residencias Profesionales</h1>
      <p>Revisión de reportes preliminares</p>
    </div>
  </div>
</header>

<div class="layout">
  <aside th:replace="~{fragmento/fragment :: aside}"></aside>

  <main class="main">
    <div class="card">
      <div th:if="${msg}" class="alert-success">
        <span th:text="${msg}"></span>
      </div>

      <h2>Reportes para revisión</h2>

      <form th:action="@{/reportePreliminar/revisar}" method="get" class="grid" style="margin-bottom:20px;">
        <div class="field">
          <label>Filtrar por dictamen</label>
          <select name="dictamen">
            <option value="">Todos</option>
            <option value="PENDIENTE" th:selected="${dictamen == 'PENDIENTE'}">PENDIENTE</option>
            <option value="APROBADO" th:selected="${dictamen == 'APROBADO'}">APROBADO</option>
            <option value="CONDICIONADO" th:selected="${dictamen == 'CONDICIONADO'}">CONDICIONADO</option>
            <option value="RECHAZADO" th:selected="${dictamen == 'RECHAZADO'}">RECHAZADO</option>
          </select>
        </div>

        <div class="actions" style="grid-column:1 / -1;">
          <button type="submit">Buscar</button>
          <a class="btn secondary" th:href="@{/reportePreliminar/revisar}">Limpiar</a>
        </div>
      </form>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Proyecto</th>
            <th>Fecha</th>
            <th>Dictamen</th>
            <th>Revisión</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${reportePreliminar}">
            <td th:text="${r.idReportePreliminar}"></td>
            <td th:text="${r.proyectoResidencia != null ? r.proyectoResidencia.nombreProyecto : ''}"></td>
            <td th:text="${#dates.format(r.fechaEntrega, 'dd-MM-yyyy')}"></td>
            <td th:text="${r.dictamen}"></td>
            <td>
              <a class="btn secondary" th:href="@{/reportePreliminar/ver/{id}(id=${r.idReportePreliminar})}">
                Ver
              </a>
              <a class="btn light" th:href="@{/reportePreliminar/dictaminar/{id}(id=${r.idReportePreliminar})}">
                Dictaminar
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>
