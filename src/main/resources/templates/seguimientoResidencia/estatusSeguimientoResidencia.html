<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estatus seguimientos</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="header">
  <div class="header-content">
    <img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
    <div>
      <h1>Sistema de Residencias Profesionales</h1>
      <p>Administración de estatus de seguimientos</p>
    </div>
  </div>
</header>

<div class="layout">
  <aside th:replace="~{fragmento/fragment :: aside}"></aside>

  <main class="main">
    <div class="card">
      <h2>Seguimientos activos e inactivos</h2>

      <form th:action="@{/seguimientoResidencia/estatusSeguimientos}" method="get" class="grid" style="margin-bottom:20px;">
        <div class="field">
          <label>Filtrar por tipo</label>
          <select name="tipoSeguimiento">
            <option value="">Todos</option>
            <option value="PRIMER_SEGUIMIENTO" th:selected="${tipoSeguimiento == 'PRIMER_SEGUIMIENTO'}">PRIMER_SEGUIMIENTO</option>
            <option value="SEGUNDO_SEGUIMIENTO" th:selected="${tipoSeguimiento == 'SEGUNDO_SEGUIMIENTO'}">SEGUNDO_SEGUIMIENTO</option>
          </select>
        </div>

        <div class="actions" style="grid-column:1 / -1;">
          <button type="submit">Buscar</button>
          <a class="btn secondary" th:href="@{/seguimientoResidencia/estatusSeguimientos}">Limpiar</a>
        </div>
      </form>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tipo</th>
            <th>Calificación final</th>
            <th>Estatus</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="s : ${seguimientoResidencia}">
            <td th:text="${s.idSeguimientoResidencia}"></td>
            <td th:text="${s.tipoSeguimiento}"></td>
            <td th:text="${s.calificacionFinal}"></td>
            <td>
              <span th:if="${s.estatus == 1}">Activo</span>
              <span th:if="${s.estatus == 0}">Inactivo</span>
            </td>
            <td>
              <a class="btn danger" th:if="${s.estatus == 1}" th:href="@{/seguimientoResidencia/eliminar/{id}(id=${s.idSeguimientoResidencia})}">
                Desactivar
              </a>
              <a class="btn" th:if="${s.estatus == 0}" th:href="@{/seguimientoResidencia/activar/{id}(id=${s.idSeguimientoResidencia})}">
                Activar
              </a>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="actions">
        <a class="btn secondary" th:href="@{/seguimientoResidencia/mostrarSeguimientos}">Regresar</a>
      </div>
    </div>
  </main>
</div>
</body>
</html>
