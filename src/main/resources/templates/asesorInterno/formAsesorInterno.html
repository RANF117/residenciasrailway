<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de asesor interno</title>
<link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
	<header class="header">
		<div class="header-content">
			<img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
			<div>
				<h1>Sistema de Residencias Profesionales</h1>
				<p>Registro de asesor interno</p>
			</div>
		</div>
	</header>

	<div class="layout">
		<aside th:replace="~{fragmento/fragment :: aside}"></aside>

		<main class="main">
			<div class="card">
				<h2>Formulario de asesor interno</h2>

				<p class="nota-obligatoria">
					Los campos marcados con <span class="obligatorio">*</span> son
					obligatorios.
				</p>

				<form th:action="@{/asesorInterno/guardar}"
					th:object="${asesorInterno}" method="post"
					enctype="multipart/form-data" id="formAsesorInterno">
					<input type="hidden" th:field="*{idAsesorInterno}"> <input
						type="hidden" th:field="*{estatus}"> <input type="hidden"
						th:field="*{foto}">

					<div class="grid">
						<div class="field">
							<label for="nombre">Nombre <span class="obligatorio">*</span></label>
							<input type="text" id="nombre" th:field="*{nombre}">
						</div>

						<div class="field">
							<label for="apellidoPaterno">Apellido paterno <span
								class="obligatorio">*</span></label> <input type="text"
								id="apellidoPaterno" th:field="*{apellidoPaterno}">
						</div>

						<div class="field">
							<label for="apellidoMaterno">Apellido materno <span
								class="obligatorio">*</span></label> <input type="text"
								id="apellidoMaterno" th:field="*{apellidoMaterno}">
						</div>

						<div class="field">
							<label for="correo">Correo <span class="obligatorio">*</span></label>
							<input type="text" id="correo" th:field="*{correo}">
						</div>

						<div class="field">
							<label for="telefono">Teléfono <span class="obligatorio">*</span></label>
							<input type="text" id="telefono" th:field="*{telefono}"
								maxlength="10">
						</div>

						<div class="field">
							<label for="departamento">Departamento académico <span
								class="obligatorio">*</span></label> <select id="departamento"
								th:field="*{departamentoAcademico.idDepartamentoAcademico}">
								<option value="">Seleccione un departamento</option>
								<option th:each="d : ${departamentos}"
									th:value="${d.idDepartamentoAcademico}" th:text="${d.nombre}"></option>
							</select>
						</div>

						<div class="field">
							<label for="usuario">Usuario del sistema <span
								class="obligatorio">*</span></label> <select id="usuario"
								th:field="*{usuario.id}">
								<option value="">Seleccione un usuario</option>
								<option th:each="u : ${usuariosDisponibles}" th:value="${u.id}"
									th:text="${u.username}"></option>
							</select> <small th:if="${#lists.isEmpty(usuariosDisponibles)}"
								class="error-message"> No hay usuarios disponibles para
								vincular. </small>

							<div th:if="${#lists.isEmpty(usuariosDisponibles)}"
								style="margin-top: 10px;">
								<a class="btn secondary" th:href="@{/usuario/mostrarUsuarios}">
									Ir a usuarios </a>
							</div>
						</div>

						<div class="field">
							<label for="archivo">Foto</label> <input type="file" id="archivo"
								name="archivo" accept=".jpg,.jpeg,.png">
						</div>
					</div>

					<div class="actions">
						<button type="submit">Guardar</button>
						<a class="btn secondary"
							th:href="@{/asesorInterno/mostrarAsesoresInternos}">Cancelar</a>
					</div>
				</form>
			</div>
		</main>
	</div>
</body>
</html>
