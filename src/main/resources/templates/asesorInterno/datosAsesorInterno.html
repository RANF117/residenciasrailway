<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asesores internos</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <img th:src="@{/img/logoTec.jpeg}" alt="Logo Tec" class="logo-header">
      <div>
        <h1>Sistema de Residencias Profesionales</h1>
        <p>Catálogo de asesores internos</p>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside th:replace="~{fragmento/fragment :: aside}"></aside>

    <main class="main">
      <div class="card">
        <div th:if="${msg}" class="alert-success">
          <span th:text="${msg}"></span>
        </div>

        <div class="actions">
          <a class="btn" th:href="@{/asesorInterno/formulario}">
            <i class="bi bi-plus-circle"></i> Nuevo asesor interno
          </a>

          <a class="btn light" th:href="@{/asesorInterno/estatusAsesoresInternos}">
            <i class="bi bi-arrow-repeat"></i> Administrar estatus
          </a>
        </div>

        <h2>Asesores internos activos</h2>

        <form th:action="@{/asesorInterno/mostrarAsesoresInternos}" method="get" class="grid" style="margin-bottom: 20px;">
          <div class="field">
            <label>Buscar por nombre</label>
            <input type="text" name="nombre" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ ]+$" 
            title="Por favor, ingrese solo letras"  th:value="${nombre}">
          </div>

          <div class="actions" style="grid-column:1 / -1;">
            <button type="submit">Buscar</button>
            <a class="btn secondary" th:href="@{/asesorInterno/mostrarAsesoresInternos}">Limpiar</a>
          </div>
        </form>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Foto</th>
              <th>Nombre</th>
              <th>Departamento</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="a : ${asesorInterno}">
              <td th:text="${a.idAsesorInterno}"></td>
              <td>
                <img th:if="${a.foto == 'noFoto.jpeg'}" th:src="@{/img/noFoto.jpeg}" width="60" style="border-radius: 8px;">
                <img th:if="${a.foto != 'noFoto.jpeg'}" th:src="@{/residencias/asesoresInternos/{img}(img=${a.foto})}" width="60" style="border-radius: 8px;">
              </td>
              <td th:text="${a.nombre + ' ' + a.apellidoPaterno + ' ' + a.apellidoMaterno}"></td>
              <td th:text="${a.departamentoAcademico != null ? a.departamentoAcademico.nombre : ''}"></td>
              <td>
                <a class="btn secondary" th:href="@{/asesorInterno/ver/{id}(id=${a.idAsesorInterno})}">
                  <i class="bi bi-eye"></i>
                </a>
                <a class="btn light" th:href="@{/asesorInterno/editar/{id}(id=${a.idAsesorInterno})}">
                  <i class="bi bi-pencil-square"></i>
                </a>
                <a class="btn danger" th:href="@{/asesorInterno/eliminar/{id}(id=${a.idAsesorInterno})}"
                   onclick="return confirm('¿Desea desactivar este asesor interno?')">
                  <i class="bi bi-trash"></i>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
